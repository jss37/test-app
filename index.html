<html>
    <head>
        <title>App Test</title>
        <style></style>
    </head>
    <body>
        <input type="number" value="4" id="input_one">
        <input type="number" value="5" id="input_two">
        <button onclick="calc()">Press</button>
        <div id="results"></div>
    <script>
    async function calc() {

    const firstVal = Number(document.getElementById("input_one").value);
    const secondVal = Number(document.getElementById("input_two").value);

    const result = firstVal * secondVal;

    document.getElementById("results").textContent = result;

    const data = {
        input1: firstVal,
        input2: secondVal,
        result: result
    };

    try {

        const response = await fetch(
            "https://script.google.com/macros/s/AKfycbx4e0UO3r4gW50bW8qRv9MDGdPRPcl_TmMX4pcCL_By_8Mmv33m7TKHlL1-jLRm9gMXdA/exec",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }
        );

        const json = await response.json();

        console.log(json);

    } catch(err) {

        console.error(err);

    }

}

    </script>
    </body>
    
</html>
