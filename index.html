<html>
<head>
    <title>App Test</title>
    <style></style>
</head>

<body>

    <input type="number" value="4" id="input_one">
    <input type="number" value="5" id="input_two">

    <button onclick="calc()">Press</button>

    <div id="results"></div>

<script>

async function calc() {

    const firstVal = Number(document.getElementById("input_one").value);
    const secondVal = Number(document.getElementById("input_two").value);

    const result = firstVal * secondVal;

    document.getElementById("results").textContent = result;

    try {

        const response = await fetch(
            "https://script.google.com/macros/s/AKfycbxjgdnc2PfJBpnlB3BTjoJUp1qgvcadZwoyQL73G7B7WYbsN1GQOlM-lOlglJWiZNnBVQ/exec",
            {
                method: "POST",
                body: new URLSearchParams({
                    input1: firstVal,
                    input2: secondVal,
                    result: result
                })
            }
        );

        const text = await response.text();

        console.log("Apps Script response:", text);

    } catch(err) {

        console.error("Send failed:", err);

    }

}

</script>

</body>
</html>
