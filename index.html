<!DOCTYPE html>
<html>

<head>
    <title>App Test</title>
</head>

<body>

<input type="number" id="input_one" value="4">
<input type="number" id="input_two" value="5">

<button onclick="calc()">
    Calculate
</button>

<div id="results"></div>

<script>

function calc() {

    const firstVal =
        Number(document.getElementById("input_one").value);

    const secondVal =
        Number(document.getElementById("input_two").value);

    if (Number.isNaN(firstVal) ||
        Number.isNaN(secondVal)) {

        alert("Please enter valid numbers.");
        return;
    }

    const result =
        firstVal * secondVal;

    document.getElementById("results").textContent =
        "Result: " + result;

    const form =
        document.createElement("form");

    form.method = "POST";

    form.action =
        "https://script.google.com/macros/s/AKfycbyfceIXtQTdPQvOPIHp4Ps96J1l9QH7RGy9vPh7V-MUjB2lZtXKJW5ZUTyOurDXId5d1Q/exec";

    form.target =
        "hiddenFrame";

    const values = {

        input1: firstVal,
        input2: secondVal,
        result: result

    };

    for (const key in values) {

        const input =
            document.createElement("input");

        input.type = "hidden";
        input.name = key;
        input.value = values[key];

        form.appendChild(input);

    }

    document.body.appendChild(form);

    form.submit();

    setTimeout(() => form.remove(), 100);

}

</script>

<iframe
name="hiddenFrame"
style="display:none;">
</iframe>

</body>
</html>
